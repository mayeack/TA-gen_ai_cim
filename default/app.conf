#
# Splunk app configuration file
#
# TA-gen_ai_cim
# Technology Add-on for Generative AI Common Information Model
#
# Compatible with: Splunk Enterprise 9.0+, Splunk Cloud
#

[install]
is_configured = false
build = 10

[ui]
is_visible = true
label = AI Governance
show_in_nav = true

[launcher]
author = Splunk AI Governance Team
description = (ALPHA release) Technology Add-on that normalizes GenAI events into a unified Common Information Model (CIM) for inference, safety, governance, and evaluation telemetry. Provides search-time field extractions, normalization, and governance-ready outputs for AI logging across multiple providers (Anthropic, OpenAI, AWS Bedrock, local models).
version = 1.2.0

[package]
id = TA-gen_ai_cim
check_for_updates = false

[triggers]
# Splunk-defined confs (props, transforms, collections, macros, savedsearches)
# are auto-reloaded by Splunk; do NOT list them here. Only the TA's custom
# confs need explicit reload triggers so the configuration UI does not
# require a Splunk restart after edits.
reload.ta_gen_ai_cim_account = simple
reload.ta_gen_ai_cim_detection = simple
reload.ta_gen_ai_cim_genai_scoring = simple
reload.ta_gen_ai_cim_llm = simple
reload.ta_gen_ai_cim_servicenow = simple