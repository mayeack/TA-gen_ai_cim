#
# web.conf - Web server configuration
# TA-gen_ai_cim
#
# Exposes the app's REST endpoints. Splunk Cloud only allows narrowly
# scoped keys here; the [expose:*] stanza below is permitted.
#

[expose:ta_gen_ai_cim]
# Expose REST endpoints for the app (account configuration handler).
pattern = TA-gen_ai_cim/*
methods = GET, POST
