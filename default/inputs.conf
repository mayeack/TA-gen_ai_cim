# === ES Asset & Identity framework source registration ===
# Registers the MedAdvice CSV lookups as identity/asset sources so the ES
# merge process folds them into identity_lookup_expanded / asset_lookup_by_str.
[identity_manager://medadvice_identities]
target = identity
url = lookup://medadvice_identities
category = MedAdvice GenAI users
description = Identities observed in MedAdvice GenAI traffic (index=gen_ai_log)
disabled = false

[identity_manager://medadvice_assets]
target = asset
url = lookup://medadvice_assets
category = MedAdvice GenAI assets
description = Source IPs / hosts observed in MedAdvice GenAI traffic
disabled = false
