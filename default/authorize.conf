#
# authorize.conf - Role definitions
# TA-gen_ai_cim
#
# Defines the ai_reviewers role for analysts who can edit review findings.
# Users with this role can read/write to the KV store collection.
#
# Compatible with: Splunk Enterprise 9.0+, Splunk Cloud
#

###############################################################################
# AI REVIEWERS ROLE
# Grants ability to create and update review findings
###############################################################################

[role_ai_reviewers]
# Import capabilities from default user role
importRoles = user

# Search capabilities needed for review workflow
# Splunk Cloud / AppInspect: do NOT include the global 'main' index here.
# Customers grant access to 'main' via their own role binding if needed.
# NOTE: these indexes are environment-provided — the TA ships no
# indexes.conf. Create them (or retarget the role) in your environment.
srchIndexesAllowed = gen_ai_cim;gen_ai_log;ai_log2
srchIndexesDefault = gen_ai_log

# Time range limits (adjust as needed for your environment)
srchTimeWin = -1
srchDiskQuota = 500
srchJobsQuota = 10

# KV store write capability is granted via metadata permissions
# Additional capabilities for REST API access
# Note: list_storage_passwords only if needed for custom integrations

###############################################################################
# NOTE: This app intentionally does NOT modify the stock admin role.
# The aicase command's AI-powered summaries need the Splunk AI Toolkit
# capabilities (apply_ai_commander_command, list_ai_commander_config), and
# the ML dashboards need run_risky_commands to run fit/apply without
# warnings. Grant these per environment — e.g. via a local/authorize.conf
# override or your role management — rather than shipping edits to a
# Splunk-provided role (flagged by AppInspect for Splunk Cloud).
###############################################################################

###############################################################################
# ML FEEDBACK LOOP ROLE
# Role for users who need to view ML dashboards with fit/apply commands
###############################################################################

[role_ml_power_user]
importRoles = power
# Allow running ML commands in dashboards without risky command warnings
run_risky_commands = enabled
# Splunk Cloud / AppInspect: do NOT include the global 'main' index here.
srchIndexesAllowed = gen_ai_cim;gen_ai_log;ai_log2
srchIndexesDefault = gen_ai_log
