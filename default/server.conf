#
# server.conf - Search Head Cluster replication settings
# TA-gen_ai_cim
#
# Declare the TA's custom .conf files for SHC configuration replication so
# runtime edits (via the configuration UI / REST handler) propagate to all
# search head cluster members. Required by AppInspect
# check_custom_conf_replication for Splunk Cloud.
#

[shclustering]
conf_replication_include.ta_gen_ai_cim_account = true
conf_replication_include.ta_gen_ai_cim_detection = true
conf_replication_include.ta_gen_ai_cim_genai_scoring = true
conf_replication_include.ta_gen_ai_cim_llm = true
conf_replication_include.ta_gen_ai_cim_servicenow = true
