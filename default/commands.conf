#
# commands.conf - Custom Search Command Definitions
# TA-gen_ai_cim
#
# Defines custom search commands for ServiceNow AI Case Management integration.
#
# Compatible with: Splunk Enterprise 9.0+, Splunk Cloud
#

###############################################################################
# AICASE - ServiceNow AI Case Management Command
###############################################################################

[aicase]
# Description: Create or lookup ServiceNow AI Case records linked to GenAI events
#
# Usage:
#   | aicase [event_id=<value>] [mode=create|lookup|open]
#
# Parameters:
#   event_id - Optional. Override gen_ai.event.id from event
#   mode     - Optional. create (default), lookup (check only), open (existing URL only)
#
# Examples:
#   index=gen_ai_log | aicase
#   | makeresults | eval gen_ai.event.id="abc123" | aicase event_id=abc123
#   index=gen_ai_log | aicase mode=lookup
#
# Output Fields:
#   snow_case_url     - URL to ServiceNow AI Case
#   snow_case_sys_id  - ServiceNow sys_id
#   snow_case_number  - Case number
#   snow_case_status  - created, existing, not_found, error
#   snow_case_message - Human-readable status

# Python search command using Splunk SDK
filename = aicase.py

# Streaming command - processes events one at a time
streaming = true

# Command type - streaming (processes each event)
type = streaming

# Use chunked protocol for Python SDK streaming commands
chunked = true

# NOTE: passauth is intentionally NOT set. Splunk ignores passauth for chunked
# (v2 protocol) commands, so it would give a false impression of running with
# system privileges. This command runs under the invoking user's session
# (searchinfo.session_key); access is gated by the read ACL in default.meta
# ([commands/aicase]) and by the admin-only ACL on ta_gen_ai_cim_account.conf.
# python.required declares the minimum interpreter for Splunk's Python 3.13
# runtime transition (Splunk 9.4+).
python.version = python3
python.required = 3.13

###############################################################################
# GENAISCORE - GenAI Scoring Pipeline Command
###############################################################################

[genaiscore]
# Description: Score GenAI events using AI Toolkit's default LLM
#
# Usage:
#   | genaiscore pipeline=<pipeline_stanza>
#
# Parameters:
#   pipeline - Required. Pipeline stanza (pipeline_1 through pipeline_10)
#
# Examples:
#   index=gen_ai_log | genaiscore pipeline=pipeline_1
#
# Output Fields:
#   gen_ai.<name>.risk_score       - Risk score (0.0-1.0)
#   gen_ai.<name>.genai_detected   - Detection flag (true/false)
#   gen_ai.<name>.confidence       - Confidence level
#   gen_ai.<name>.explanation      - LLM reasoning
#   gen_ai.<name>.types            - Detected sub-types
#   genai_scoring_status           - success or error
#   genai_scoring_pipeline         - Pipeline name
#   genai_scoring_error            - Error details if failed

filename = genaiscore.py
streaming = true
type = streaming
chunked = true
# NOTE: passauth is intentionally NOT set. Splunk ignores passauth for chunked
# (v2 protocol) commands; this command runs under the invoking user's session
# (searchinfo.session_key). Access is gated by the admin-only read ACL in
# default.meta ([commands/genaiscore]) and by the admin-only ACL on
# ta_gen_ai_cim_genai_scoring.conf.
python.version = python3
python.required = 3.13
