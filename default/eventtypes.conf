###############################################################################
# TA-gen_ai_cim - eventtypes.conf
# Event type definitions for GenAI Common Information Model
#
# Uses gen_ai.* namespace fields from props.conf normalizations.
# No circular tag references (tags flow FROM eventtypes via tags.conf only).
###############################################################################

###############################################################################
# Core GenAI inference events
###############################################################################
[gen_ai_inference]
search = index=gen_ai_log gen_ai.provider.name=* sourcetype!=ai_cim:*:ml_scoring sourcetype!=gen_ai:*:scoring sourcetype!=ai_cim:*:gen_ai_scoring sourcetype!=genai_scoring
priority = 5

[gen_ai_inference_anthropic]
search = eventtype=gen_ai_inference gen_ai.provider.name=anthropic
priority = 4

[gen_ai_inference_openai]
search = eventtype=gen_ai_inference gen_ai.provider.name=openai
priority = 4

[gen_ai_inference_bedrock]
search = eventtype=gen_ai_inference gen_ai.provider.name=bedrock
priority = 4

[gen_ai_inference_vertexai]
search = eventtype=gen_ai_inference gen_ai.provider.name=vertexai
priority = 4

[gen_ai_inference_azure]
search = eventtype=gen_ai_inference gen_ai.provider.name=azure
priority = 4

###############################################################################
# Safety and governance events
###############################################################################
[gen_ai_safety_event]
search = gen_ai.safety.violated="true" OR gen_ai.guardrail.triggered="true"
priority = 5

[gen_ai_safety_violation]
search = gen_ai.safety.violated="true"
priority = 6

[gen_ai_guardrail_trigger]
search = gen_ai.guardrail.triggered="true"
priority = 6

[gen_ai_pii_detection]
search = gen_ai.pii.detected="true"
priority = 6

[gen_ai_policy_block]
search = gen_ai.policy.blocked="true"
priority = 6

###############################################################################
# Evaluation and TEVV events
###############################################################################
[gen_ai_evaluation]
search = gen_ai.evaluation.score.value=* OR gen_ai.drift.status=*
priority = 5

[gen_ai_drift_detected]
search = gen_ai.drift.status=warning OR gen_ai.drift.status=critical
priority = 6

[gen_ai_evaluation_failure]
search = gen_ai.evaluation.score.value<0.5
priority = 6

###############################################################################
# Performance-based events
###############################################################################
[gen_ai_high_latency]
search = eventtype=gen_ai_inference gen_ai.client.operation.duration>5
priority = 6

[gen_ai_high_cost]
search = eventtype=gen_ai_inference gen_ai.cost.total>1.0
priority = 6

[gen_ai_high_token_usage]
search = eventtype=gen_ai_inference gen_ai.usage.total_tokens>100000
priority = 6

###############################################################################
# Error and retry events
###############################################################################
[gen_ai_inference_error]
search = eventtype=gen_ai_inference (gen_ai.status=error OR error.type=*)
priority = 6
